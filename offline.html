<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline · Soraya</title>
  <meta name="theme-color" content="#0b0713" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    :root{
      --void:#0b0713; --gold:#c9a86a; --gold-soft:#e6cf9c;
      --mist:#c3b7da; --mist-dim:#8f83ad; --line:rgba(201,168,106,.22);
    }
    *{box-sizing:border-box; margin:0; padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:var(--mist); background:var(--void);
      min-height:100dvh; display:flex; align-items:center; justify-content:center;
      padding:28px; text-align:center; overflow:hidden; position:relative;
    }
    /* mystischer Nebel-Hintergrund (rein CSS, kein Bild) */
    body::before{
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(70% 45% at 80% 12%, rgba(140,74,206,.30), transparent 60%),
        radial-gradient(62% 44% at 14% 26%, rgba(58,50,168,.28), transparent 60%),
        radial-gradient(95% 55% at 50% -10%, rgba(74,44,120,.55), transparent 62%),
        linear-gradient(180deg,#0e0a22 0%,#0a0618 52%,#060410 100%);
    }
    .shell{position:relative; z-index:1; max-width:400px}
    .sigil{
      font-size:44px; color:var(--gold); opacity:.9; line-height:1;
      animation:pulse 3.2s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:.55} 50%{opacity:1}}
    h1{
      font-family:"Cormorant Garamond",Georgia,serif; font-weight:600;
      font-size:29px; color:var(--gold-soft); margin:22px 0 14px; letter-spacing:.01em;
    }
    p{font-size:15.5px; line-height:1.7; color:var(--mist-dim); margin-bottom:28px}
    button{
      font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
      color:#2a1c05; background:linear-gradient(180deg,var(--gold-soft),var(--gold));
      border:none; border-radius:999px; padding:14px 34px;
      box-shadow:0 8px 24px rgba(201,168,106,.2);
    }
    button:active{transform:scale(.96)}
    .hint{margin-top:22px; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--mist-dim); opacity:.7}
    @media(prefers-reduced-motion:reduce){.sigil{animation:none}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="sigil">✦</div>
    <h1>Die Sterne sind kurz nicht erreichbar</h1>
    <p>Du bist offline. Soraya braucht eine aktive Internetverbindung, um deine Charts, Horoskope und Deutungen zu berechnen.</p>
    <button onclick="location.reload()">Erneut verbinden</button>
    <div class="hint">Soraya</div>
  </div>
  <script>
    // sobald das Netz zurück ist, automatisch neu laden
    window.addEventListener("online", function(){ location.reload(); });
  </script>
</body>
</html>
