<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Soraya — Login</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#070817" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js?v=6.7.0"></script>
  <link rel="stylesheet" href="/style.css?v=6.7.0" />
</head>

<body class="login-body">
  <div class="cosmos" aria-hidden="true"></div>

  <main class="login-app">
    <section class="login-shell card glow">
      <div class="login-logo">
        <div class="sigil">✵</div>
        <h1>SORAYA</h1>
        <p>Dein persönlicher Sternenraum</p>
      </div>

      <div class="login-tabs" role="tablist" aria-label="Login Modus">
        <button id="loginTabButton" class="active" type="button" onclick="sorayaLogin.setMode('login')">Einloggen</button>
        <button id="registerTabButton" type="button" onclick="sorayaLogin.setMode('register')">Registrieren</button>
      </div>

      <form id="loginForm" novalidate>
        <input id="loginMode" type="hidden" value="login" />

        <label for="loginEmail">E-Mail</label>
        <input
          id="loginEmail"
          type="email"
          inputmode="email"
          autocomplete="email"
          autocapitalize="none"
          spellcheck="false"
          placeholder="deine@email.de"
          required
        />

        <label for="loginPassword">Passwort</label>
        <div class="password-wrap">
          <input
            id="loginPassword"
            type="password"
            autocomplete="current-password"
            placeholder="Mindestens 6 Zeichen"
            required
          />
          <button class="password-toggle" type="button" onclick="sorayaLogin.togglePassword()" aria-label="Passwort anzeigen">👁</button>
        </div>

        <button id="loginSubmitButton" class="btn gold block" type="submit">Einloggen</button>
      </form>

      <div class="login-mini-actions">
        <button class="btn" type="button" onclick="sorayaLogin.resetPassword()">Passwort vergessen</button>
        <a class="btn" href="/?section=profile">Zur App</a>
      </div>

      <div id="loginStatus" class="status login-status" aria-live="polite">Bereit.</div>

      <details id="connectionBox" class="login-config developer-only">
        <summary>Admin-Verbindung</summary>
        <p>Nur sichtbar, wenn die öffentliche Verbindung in <code>config.js</code> fehlt.</p>

        <label for="loginSupabaseUrl">Supabase URL</label>
        <input id="loginSupabaseUrl" placeholder="https://...supabase.co" />

        <label for="loginSupabaseAnonKey">Supabase anon/public key</label>
        <textarea id="loginSupabaseAnonKey" placeholder="anon/public key"></textarea>

        <label for="loginEngineUrl">Soraya Backend URL</label>
        <input id="loginEngineUrl" placeholder="https://...railway.app" />

        <button class="btn gold block" type="button" onclick="sorayaLogin.saveConfig()">Verbindung speichern</button>
      </details>
    </section>

    <footer style="text-align:center;padding:26px 16px calc(30px + env(safe-area-inset-bottom));font-size:12.5px;color:#9184a8;">
      <a href="/datenschutz" style="color:#ffe39b;text-decoration:none;">Datenschutz</a>
      <span style="opacity:.4;margin:0 8px;">·</span>
      <a href="/impressum" style="color:#ffe39b;text-decoration:none;">Impressum</a>
    </footer>
  </main>

  <script src="/login.js?v=6.7.0" defer></script>
</body>
</html>
